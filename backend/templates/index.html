{{template "base.html" .}}

{{define "content"}}
<div class="container mx-auto p-4 max-w-2xl">
    <h1 class="text-3xl font-bold mb-6 text-center">Генератор маршрутов по Удмуртии</h1>
    
    <!-- Форма с HTMX -->
    <form hx-post="/generate" 
          hx-target="#result-area" 
          hx-swap="innerHTML"
          class="bg-white p-6 rounded-lg shadow-md mb-6">
        
        <label class="block text-gray-700 font-bold mb-2">
            Выберите тип отдыха:
        </label>
        
        <select name="trip_type" class="w-full border border-gray-300 rounded p-3 mb-4">
            <option value="nature">Природа и активный отдых</option>
            <option value="culture">Культура и музеи</option>
            <option value="food">Гастрономический тур</option>
            <option value="family">Семейный отдых</option>
        </select>
        
        <button type="submit" 
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded transition">
            🗺️ Сгенерировать маршрут
        </button>
    </form>
    
    <!-- Сюда будет вставляться результат -->
    <div id="result-area" class="bg-gray-50 p-6 rounded-lg border-2 border-dashed border-gray-300 min-h-[200px]">
        <p class="text-gray-500 text-center">Здесь появится ваш маршрут...</p>
    </div>
</div>
{{end}}
