{{define "content"}}
<div class="max-w-2xl mx-auto">
    <h1 class="text-3xl font-bold mb-8 tracking-widest">ПРОФИЛЬ</h1>

    <!-- Карточка профиля -->
    <div class="bg-t2-white text-t2-black border-2 border-t2-black p-6 mb-6">
        <div class="flex items-center gap-4 mb-6">
            <div>
                <h2 class="text-xl font-semibold tracking-wider">{{.Email}}</h2>
                <span class="inline-block mt-1 px-3 py-1 text-sm font-bold tracking-wider {{if .IsVerified}}bg-t2-black text-t2-white{{else}}bg-t2-magenta text-t2-white{{end}}">
                    {{if .IsVerified}}ПОДТВЕРЖДЁН{{else}}НЕ ПОДТВЕРЖДЁН{{end}}
                </span>
            </div>
        </div>
    </div>

    <!-- Секция сохранённых маршрутов (заглушка на будущее) -->
    <div class="bg-t2-white text-t2-black border-2 border-t2-black p-6">
        <h2 class="text-xl font-semibold mb-4 tracking-wider">СОХРАНЁННЫЕ МАРШРУТЫ</h2>
        <div class="text-center py-8">
            <p class="text-sm tracking-wider">У ВАС ПОКА НЕТ СОХРАНЁННЫХ МАРШРУТОВ</p>
            <a href="/" class="inline-block mt-4 text-t2-magenta hover:text-t2-black underline tracking-wider text-sm">
                СОЗДАТЬ ПЕРВЫЙ МАРШРУТ
            </a>
        </div>
    </div>
</div>
{{end}}
