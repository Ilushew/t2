{{template "base.html" .}}

{{define "content"}}
<div class="container mx-auto p-4 max-w-2xl">
    <h1 class="text-2xl font-bold mb-4 tracking-widest">{{.Title}}</h1>

    <div class="mb-4">
        <a href="/admin/table/{{.TableName}}" class="text-t2-magenta hover:text-t2-white tracking-wider text-sm">← К ТАБЛИЦЕ</a>
    </div>

    <form method="POST" class="bg-t2-white text-t2-black p-4 sm:p-6 rounded-none border-2 border-t2-magenta">
        {{range .Columns}}
        <div class="mb-4">
            <label class="block font-bold mb-1 tracking-wider text-sm">{{.}}</label>
            <input type="text" name="{{.}}" value="{{index $.RowData .}}"
                   class="w-full border-2 border-t2-black bg-t2-white text-t2-black rounded-none p-3 text-base" />
        </div>
        {{end}}
        <button type="submit"
                class="w-full sm:w-auto bg-t2-black hover:bg-t2-magenta text-t2-white font-bold py-3 px-6 rounded-none transition tracking-wider text-sm">
            СОХРАНИТЬ
        </button>
    </form>
</div>
{{end}}
