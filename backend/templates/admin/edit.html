{{template "base.html" .}}

{{define "content"}}
<style>
    .admin-form-wrapper {
        max-width: 700px;
        margin: 40px auto;
        padding: 0 20px;
        color: #ffffff;
        font-family: 'Inter', system-ui, sans-serif;
    }

    .form-header {
        margin-bottom: 24px;
        padding-bottom: 16px;
        border-bottom: 1px solid #2a2a2a;
    }

    .form-title {
        font-size: 20px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin: 0 0 8px;
    }

    .form-back {
        color: #888888;
        font-size: 13px;
        text-decoration: none;
        font-weight: 500;
        transition: color 0.2s;
    }

    .form-back:hover { color: #ff40d0; }

    .form-card {
        background: #141414;
        border: 1px solid #2a2a2a;
        border-radius: 16px;
        padding: 28px 24px;
        display: flex;
        flex-direction: column;
        gap: 20px;
    }

    .form-label {
        display: block;
        font-size: 12px;
        font-weight: 600;
        color: #aaaaaa;
        margin-bottom: 8px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    .form-input {
        width: 100%;
        padding: 14px 16px;
        background: #1e1e1e;
        border: 2px solid #333333;
        border-radius: 10px;
        color: #ffffff;
        font-size: 15px;
        font-family: inherit;
        transition: all 0.2s ease;
    }

    .form-input:focus {
        border-color: #ff40d0;
        outline: none;
        box-shadow: 0 0 0 3px rgba(255, 64, 208, 0.15);
        background: #252525;
    }

    .section-title {
        font-size: 13px;
        font-weight: 700;
        color: #ff40d0;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-top: 8px;
        padding-top: 8px;
        border-top: 1px dashed #2a2a2a;
    }

    .coord-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 16px;
    }

    .btn-submit {
        width: 100%;
        padding: 16px;
        background: linear-gradient(135deg, #ff40d0 0%, #d600a0 100%);
        color: #ffffff;
        border: none;
        border-radius: 50px;
        font-size: 14px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-top: 8px;
    }

    .btn-submit:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 25px rgba(255,64,208,0.3);
    }

    .btn-submit:active {
        transform: translateY(0);
    }

    @media (max-width: 600px) {
        .coord-grid { grid-template-columns: 1fr; }
        .admin-form-wrapper { margin: 30px auto; }
        .form-card { padding: 24px 18px; }
    }
</style>

<div class="admin-form-wrapper">
    <div class="form-header">
        <h1 class="form-title">{{.Title}}</h1>
        <a href="/admin/table/{{.TableName}}" class="form-back">← К таблице</a>
    </div>

    <form method="POST" class="form-card">
        <!-- Динамические поля -->
        {{range .Columns}}
        <div class="form-group">
            <label class="form-label">{{.}}</label>
            <input type="text" name="{{.}}" value="{{index $.RowData .}}" class="form-input">
        </div>
        {{end}}

        <!-- Специальные поля для координат -->
        {{if eq .TableName "places"}}
        <div class="section-title">Координаты маршрута</div>
        <div class="coord-grid">
            <div>
                <label class="form-label">Начало (lat)</label>
                <input type="number" step="0.0001" name="lat_start" value="{{.Place.LatStart}}" class="form-input">
            </div>
            <div>
                <label class="form-label">Начало (lon)</label>
                <input type="number" step="0.0001" name="lon_start" value="{{.Place.LonStart}}" class="form-input">
            </div>
            <div>
                <label class="form-label">Конец (lat)</label>
                <input type="number" step="0.0001" name="lat_end" value="{{.Place.LatEnd}}" class="form-input">
            </div>
            <div>
                <label class="form-label">Конец (lon)</label>
                <input type="number" step="0.0001" name="lon_end" value="{{.Place.LonEnd}}" class="form-input">
            </div>
        </div>
        {{end}}

        <button type="submit" class="btn-submit">Сохранить</button>
    </form>
</div>
{{end}}
