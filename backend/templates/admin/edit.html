{{template "base.html" .}}

{{define "content"}}
<div class="container mx-auto p-4 max-w-2xl">
    <h1 class="text-2xl font-bold mb-4">{{.Title}}</h1>

    <div class="mb-4">
        <a href="/admin/table/{{.TableName}}" class="text-blue-600 hover:underline">← Назад к таблице</a>
    </div>

    <form method="POST" class="bg-white p-4 sm:p-6 rounded-lg shadow">
        {{range .Columns}}
        <div class="mb-4">
            <label class="block text-gray-700 font-semibold mb-1">{{.}}</label>
            <input type="text" name="{{.}}" value="{{index $.RowData .}}"
                   class="w-full border border-gray-300 rounded p-3 text-base" />
        </div>
        {{end}}
        <button type="submit"
                class="w-full sm:w-auto bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-6 rounded transition text-base">
            Сохранить
        </button>
    </form>
</div>
{{end}}
