{{template "base.html" .}}

{{define "content"}}
<div class="container mx-auto p-4 max-w-4xl">
    <h1 class="text-2xl sm:text-3xl font-bold mb-6">Админ-панель</h1>
    <p class="text-gray-600 mb-4">Выберите таблицу для просмотра:</p>

    <div class="grid gap-3">
        {{range .Tables}}
        <a href="/admin/table/{{.}}"
           class="block bg-white p-4 rounded-lg shadow hover:shadow-md transition border border-gray-200 text-center text-lg">
             {{.}}
        </a>
        {{else}}
        <p class="text-gray-400">Нет таблиц</p>
        {{end}}
    </div>

    <a href="/" class="mt-6 inline-block text-blue-600 hover:underline">← На главную</a>
</div>
{{end}}
