{{template "base.html" .}}

{{define "content"}}
<div class="container mx-auto p-4 max-w-2xl">
    <h1 class="text-2xl font-bold mb-4">{{.Title}}</h1>

    <div class="mb-4">
        <a href="/admin/table/{{.TableName}}" class="text-blue-600 hover:underline">← Назад к таблице</a>
    </div>

    <form method="POST" class="bg-white p-4 sm:p-6 rounded-lg shadow">
        <div class="mb-4">
            <label class="block text-gray-700 font-semibold mb-1">Email</label>
            <input type="email" name="email" required
                   class="w-full border border-gray-300 rounded p-3 text-base" />
        </div>
        <div class="mb-4 flex items-center gap-3">
            <input type="checkbox" name="is_verified" id="is_verified"
                   class="w-5 h-5" />
            <label for="is_verified" class="text-gray-700">Верифицирован</label>
        </div>
        <div class="mb-6 flex items-center gap-3">
            <input type="checkbox" name="is_admin" id="is_admin"
                   class="w-5 h-5" />
            <label for="is_admin" class="text-gray-700">Админ</label>
        </div>
        <button type="submit"
                class="w-full sm:w-auto bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded transition text-base">
            Создать
        </button>
    </form>
</div>
{{end}}
