{{template "base.html" .}}

{{define "content"}}
<div class="container mx-auto p-4 max-w-2xl">
    <h1 class="text-2xl font-bold mb-4">{{.Title}}</h1>

    <div class="mb-4">
        <a href="/admin/table/{{.TableName}}" class="text-blue-600 hover:underline">← Назад к таблице</a>
    </div>

    <form method="POST" class="bg-white p-4 sm:p-6 rounded-lg shadow space-y-4">
        <div>
            <label class="block text-gray-700 font-semibold mb-1">Название</label>
            <input type="text" name="name" required
                   class="w-full border border-gray-300 rounded p-3 text-base" />
        </div>
        <div>
            <label class="block text-gray-700 font-semibold mb-1">Бюджет</label>
            <select name="price" class="w-full border border-gray-300 rounded p-3 text-base">
                <option value="low">Низкий</option>
                <option value="mid" selected>Средний</option>
                <option value="high">Высокий</option>
            </select>
        </div>
        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-gray-700 font-semibold mb-1">Время (часы)</label>
                <input type="number" step="0.1" name="time" value="0"
                       class="w-full border border-gray-300 rounded p-3 text-base" />
            </div>
            <div>
                <label class="block text-gray-700 font-semibold mb-1">Категория</label>
                <input type="text" name="category"
                       class="w-full border border-gray-300 rounded p-3 text-base" />
            </div>
        </div>
        <div>
            <label class="block text-gray-700 font-semibold mb-1">Тип перемещения</label>
            <input type="text" name="types_of_movement"
                   class="w-full border border-gray-300 rounded p-3 text-base" />
        </div>
        <div>
            <label class="block text-gray-700 font-semibold mb-2">Координаты маршрута</label>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-gray-500 text-sm mb-1">Начало (lat)</label>
                    <input type="number" step="0.0001" name="lat_start" value="0"
                           class="w-full border border-gray-300 rounded p-3 text-base" />
                </div>
                <div>
                    <label class="block text-gray-500 text-sm mb-1">Начало (lon)</label>
                    <input type="number" step="0.0001" name="lon_start" value="0"
                           class="w-full border border-gray-300 rounded p-3 text-base" />
                </div>
                <div>
                    <label class="block text-gray-500 text-sm mb-1">Конец (lat)</label>
                    <input type="number" step="0.0001" name="lat_end" value="0"
                           class="w-full border border-gray-300 rounded p-3 text-base" />
                </div>
                <div>
                    <label class="block text-gray-500 text-sm mb-1">Конец (lon)</label>
                    <input type="number" step="0.0001" name="lon_end" value="0"
                           class="w-full border border-gray-300 rounded p-3 text-base" />
                </div>
            </div>
        </div>
        <div>
            <label class="block text-gray-700 font-semibold mb-1">Описание</label>
            <textarea name="description" rows="3"
                      class="w-full border border-gray-300 rounded p-3 text-base"></textarea>
        </div>
        <div class="flex gap-6">
            <label class="flex items-center gap-2">
                <input type="checkbox" name="is_indoor" class="w-5 h-5" />
                <span class="text-gray-700">В помещении</span>
            </label>
            <label class="flex items-center gap-2">
                <input type="checkbox" name="with_child" class="w-5 h-5" />
                <span class="text-gray-700">С детьми</span>
            </label>
            <label class="flex items-center gap-2">
                <input type="checkbox" name="with_pets" class="w-5 h-5" />
                <span class="text-gray-700">С животными</span>
            </label>
        </div>
        <button type="submit"
                class="w-full sm:w-auto bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded transition text-base">
            Создать
        </button>
    </form>
</div>
{{end}}
