{{template "base.html" .}}

{{define "content"}}
<div class="container mx-auto p-4 max-w-2xl">
    <h1 class="text-2xl font-bold mb-4 tracking-widest">{{.Title}}</h1>

    <div class="mb-4">
        <a href="/admin/table/{{.TableName}}" class="text-t2-magenta hover:text-t2-white tracking-wider text-sm">← К ТАБЛИЦЕ</a>
    </div>

    <form method="POST" class="bg-t2-white text-t2-black p-4 sm:p-6 rounded-none border-2 border-t2-magenta space-y-4">
        <div>
            <label class="block font-bold mb-1 tracking-wider text-sm">НАЗВАНИЕ</label>
            <input type="text" name="name" required
                   class="w-full border-2 border-t2-black bg-t2-white text-t2-black rounded-none p-3 text-base" />
        </div>
        <div>
            <label class="block font-bold mb-1 tracking-wider text-sm">БЮДЖЕТ</label>
            <select name="price" class="w-full border-2 border-t2-black bg-t2-white text-t2-black rounded-none p-3 text-base">
                <option value="low">НИЗКИЙ</option>
                <option value="mid" selected>СРЕДНИЙ</option>
                <option value="high">ВЫСОКИЙ</option>
            </select>
        </div>
        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block font-bold mb-1 tracking-wider text-sm">ВРЕМЯ (ЧАСЫ)</label>
                <input type="number" step="0.1" name="time" value="0"
                       class="w-full border-2 border-t2-black bg-t2-white text-t2-black rounded-none p-3 text-base" />
            </div>
            <div>
                <label class="block font-bold mb-1 tracking-wider text-sm">КАТЕГОРИЯ</label>
                <input type="text" name="category"
                       class="w-full border-2 border-t2-black bg-t2-white text-t2-black rounded-none p-3 text-base" />
            </div>
        </div>
        <div>
            <label class="block font-bold mb-1 tracking-wider text-sm">ТИП ПЕРЕМЕЩЕНИЯ</label>
            <input type="text" name="types_of_movement"
                   class="w-full border-2 border-t2-black bg-t2-white text-t2-black rounded-none p-3 text-base" />
        </div>
        <div>
            <label class="block font-bold mb-2 tracking-wider text-sm">КООРДИНАТЫ МАРШРУТА</label>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm mb-1 tracking-wider">НАЧАЛО (LAT)</label>
                    <input type="number" step="0.0001" name="lat_start" value="0"
                           class="w-full border-2 border-t2-black bg-t2-white text-t2-black rounded-none p-3 text-base" />
                </div>
                <div>
                    <label class="block text-sm mb-1 tracking-wider">НАЧАЛО (LON)</label>
                    <input type="number" step="0.0001" name="lon_start" value="0"
                           class="w-full border-2 border-t2-black bg-t2-white text-t2-black rounded-none p-3 text-base" />
                </div>
                <div>
                    <label class="block text-sm mb-1 tracking-wider">КОНЕЦ (LAT)</label>
                    <input type="number" step="0.0001" name="lat_end" value="0"
                           class="w-full border-2 border-t2-black bg-t2-white text-t2-black rounded-none p-3 text-base" />
                </div>
                <div>
                    <label class="block text-sm mb-1 tracking-wider">КОНЕЦ (LON)</label>
                    <input type="number" step="0.0001" name="lon_end" value="0"
                           class="w-full border-2 border-t2-black bg-t2-white text-t2-black rounded-none p-3 text-base" />
                </div>
            </div>
        </div>
        <div>
            <label class="block font-bold mb-1 tracking-wider text-sm">ОПИСАНИЕ</label>
            <textarea name="description" rows="3"
                      class="w-full border-2 border-t2-black bg-t2-white text-t2-black rounded-none p-3 text-base"></textarea>
        </div>
        <div class="flex gap-6">
            <label class="flex items-center gap-2">
                <input type="checkbox" name="is_indoor" class="w-5 h-5 accent-t2-magenta" />
                <span class="tracking-wider text-sm">В ПОМЕЩЕНИИ</span>
            </label>
            <label class="flex items-center gap-2">
                <input type="checkbox" name="with_child" class="w-5 h-5 accent-t2-magenta" />
                <span class="tracking-wider text-sm">С ДЕТЬМИ</span>
            </label>
            <label class="flex items-center gap-2">
                <input type="checkbox" name="with_pets" class="w-5 h-5 accent-t2-magenta" />
                <span class="tracking-wider text-sm">С ЖИВОТНЫМИ</span>
            </label>
        </div>
        <button type="submit"
                class="w-full sm:w-auto bg-t2-black hover:bg-t2-magenta text-t2-white font-bold py-3 px-6 rounded-none transition tracking-wider text-sm">
            СОЗДАТЬ
        </button>
    </form>
</div>
{{end}}
