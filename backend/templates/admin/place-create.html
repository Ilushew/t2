{{template "base.html" .}}

{{define "content"}}
<style>
    .admin-form-wrapper {
        max-width: 700px;
        margin: 40px auto;
        padding: 0 20px;
        color: #ffffff;
        font-family: 'Inter', system-ui, sans-serif;
    }
    .form-header {
        margin-bottom: 24px;
        padding-bottom: 16px;
        border-bottom: 1px solid #2a2a2a;
    }
    .form-title {
        font-size: 20px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin: 0 0 8px;
    }
    .form-back {
        color: #888888;
        font-size: 13px;
        text-decoration: none;
        font-weight: 500;
        transition: color 0.2s;
    }
    .form-back:hover { color: #ff40d0; }
    .form-card {
        background: #141414;
        border: 1px solid #2a2a2a;
        border-radius: 16px;
        padding: 28px 24px;
        display: flex;
        flex-direction: column;
        gap: 20px;
    }
    .form-label {
        display: block;
        font-size: 12px;
        font-weight: 600;
        color: #aaaaaa;
        margin-bottom: 8px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }
    .form-input, .form-select, .form-textarea {
        width: 100%;
        padding: 14px 16px;
        background: #1e1e1e;
        border: 2px solid #333333;
        border-radius: 10px;
        color: #ffffff;
        font-size: 15px;
        font-family: inherit;
        transition: all 0.2s ease;
    }
    .form-input::placeholder, .form-textarea::placeholder { color: #555555; }
    .form-input:focus, .form-select:focus, .form-textarea:focus {
        border-color: #ff40d0;
        outline: none;
        box-shadow: 0 0 0 3px rgba(255, 64, 208, 0.15);
        background: #252525;
    }
    .form-select { cursor: pointer; appearance: none; padding-right: 36px; background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23888888' stroke-width='2'%3e%3cpath d='M6 9l6 6 6-6'/%3e%3c/svg%3e"); background-repeat: no-repeat; background-position: right 12px center; background-size: 18px; }
    .form-textarea { resize: vertical; min-height: 80px; }
    .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
    .coord-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
    .checkbox-group {
        display: flex;
        flex-direction: column;
        gap: 12px;
    }
    .check-item {
        display: flex;
        align-items: center;
        gap: 12px;
        cursor: pointer;
    }
    .check-item input[type="checkbox"] {
        width: 20px; height: 20px; accent-color: #ff40d0; cursor: pointer; flex-shrink: 0;
    }
    .check-item span { font-size: 14px; font-weight: 500; color: #e0e0e0; }
    .section-title {
        font-size: 13px;
        font-weight: 700;
        color: #ff40d0;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-top: 4px;
    }
    .btn-submit {
        width: 100%;
        padding: 16px;
        background: linear-gradient(135deg, #ff40d0 0%, #d600a0 100%);
        color: #ffffff;
        border: none;
        border-radius: 50px;
        font-size: 14px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-top: 8px;
    }
    .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(255,64,208,0.3); }
    .btn-submit:active { transform: translateY(0); }
    @media (max-width: 600px) {
        .grid-2, .coord-grid { grid-template-columns: 1fr; }
        .admin-form-wrapper { margin: 30px auto; }
        .form-card { padding: 24px 18px; }
    }
</style>

<div class="admin-form-wrapper">
    <div class="form-header">
        <h1 class="form-title">{{.Title}}</h1>
        <a href="/admin/table/{{.TableName}}" class="form-back">← К таблице</a>
    </div>

    <form method="POST" class="form-card">
        <div>
            <label class="form-label" for="name-field">Название</label>
            <input type="text" id="name-field" name="name" required class="form-input" placeholder="Введите название">
        </div>

        <div>
            <label class="form-label" for="price-field">Бюджет</label>
            <select id="price-field" name="price" class="form-select">
                <option value="low">Низкий</option>
                <option value="mid" selected>Средний</option>
                <option value="high">Высокий</option>
            </select>
        </div>

        <div class="grid-2">
            <div>
                <label class="form-label" for="time-field">Время (часы)</label>
                <input type="number" id="time-field" step="0.1" name="time" value="0" class="form-input">
            </div>
            <div>
                <label class="form-label" for="category-field">Категория</label>
                <input type="text" id="category-field" name="category" class="form-input" placeholder="Категория">
            </div>
        </div>

        <div>
            <label class="form-label" for="types-field">Тип перемещения</label>
            <input type="text" id="types-field" name="types_of_movement" class="form-input" placeholder="Например: пешком, авто">
        </div>

        <div class="section-title">Координаты маршрута</div>
        <div class="coord-grid">
            <div>
                <label class="form-label">Начало (lat)</label>
                <input type="number" step="0.0001" name="lat_start" value="0" class="form-input">
            </div>
            <div>
                <label class="form-label">Начало (lon)</label>
                <input type="number" step="0.0001" name="lon_start" value="0" class="form-input">
            </div>
            <div>
                <label class="form-label">Конец (lat)</label>
                <input type="number" step="0.0001" name="lat_end" value="0" class="form-input">
            </div>
            <div>
                <label class="form-label">Конец (lon)</label>
                <input type="number" step="0.0001" name="lon_end" value="0" class="form-input">
            </div>
        </div>

        <div>
            <label class="form-label" for="desc-field">Описание</label>
            <textarea id="desc-field" name="description" rows="3" class="form-textarea" placeholder="Описание маршрута"></textarea>
        </div>

        <div class="section-title">Дополнительно</div>
        <div class="checkbox-group">
            <label class="check-item">
                <input type="checkbox" name="is_indoor">
                <span>В помещении</span>
            </label>
            <label class="check-item">
                <input type="checkbox" name="with_child">
                <span>С детьми</span>
            </label>
            <label class="check-item">
                <input type="checkbox" name="with_pets">
                <span>С животными</span>
            </label>
        </div>

        <button type="submit" class="btn-submit">Создать</button>
    </form>
</div>
{{end}}
