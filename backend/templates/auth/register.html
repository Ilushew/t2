{{template "base.html" .}}

{{define "content"}}
<div class="min-h-screen flex items-center justify-center bg-gray-100">
    <div class="max-w-md w-full bg-white rounded-lg shadow-lg p-8">
        <h2 class="text-2xl font-bold text-center mb-6">Вход / Регистрация</h2>
        
        <form hx-post="/auth/register" 
              hx-target="#auth-form" 
              hx-swap="innerHTML"
              class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Email</label>
                <input type="email" 
                       name="email" 
                       placeholder="your@email.com" 
                       required
                       class="mt-1 w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-transparent">
            </div>
            <button type="submit" 
                    class="w-full bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700 transition">
                Получить код
            </button>
        </form>
        
        <div id="auth-form" class="mt-4"></div>
    </div>
</div>
{{end}}
