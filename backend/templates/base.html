<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}}</title>

    <!-- Fontsource: Inter (Замена Google Fonts) -->
    <link href="https://cdn.jsdelivr.net/npm/@fontsource/inter@5/index.css" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                    colors: {
                        dark: '#0a0a0a',
                        card: '#141414',
                        accent: '#ff40d0',
                        accentDark: '#d600a0',
                    }
                }
            }
        }
    </script>

    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.6"></script>

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Яндекс Карты API (глобально) -->
    <script src="https://api-maps.yandex.ru/2.1/?apikey={{.YandexKey}}&lang=ru_RU"></script>

    <!-- Глобальные стили для соответствия темной теме -->
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --text-primary: #ffffff;
            --accent: #ff40d0;
        }
        body {
            background-color: var(--bg-dark);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="flex flex-col min-h-screen m-0 p-0">

    <!-- Шапка -->
    <header class="bg-[#0a0a0a] text-white border-b border-[#333] sticky top-0 z-50">
        <div class="max-w-[1400px] mx-auto px-5 py-4 flex flex-col sm:flex-row justify-between items-center gap-3">
            <h1 class="text-xl font-bold tracking-widest uppercase hover:text-accent transition cursor-pointer">
                <a href="/" class="no-underline text-white hover:text-accent">Маршруты по Удмуртии</a>
            </h1>
            
            <nav class="flex items-center gap-4">
                {{if .IsAuthenticated}}
                    <a href="/profile" class="text-sm font-medium text-gray-300 hover:text-accent transition">
                        {{.Email}}
                    </a>
                    <a href="/auth/logout"
                       class="text-sm font-bold uppercase tracking-wider border border-accent/50 px-4 py-2 rounded-full text-accent hover:bg-accent hover:text-white transition">
                        Выйти
                    </a>
                {{else}}
                    <a href="/auth/register"
                       class="text-sm font-bold uppercase tracking-wider bg-accent/10 border border-accent px-5 py-2 rounded-full text-accent hover:bg-accent hover:text-white transition">
                        Войти
                    </a>
                {{end}}
            </nav>
        </div>
    </header>

    <!-- Основной контент (без контейнера, чтобы секции могли быть на всю ширину) -->
    <main class="flex-grow w-full">
        {{template "content" .}}
    </main>

    <!-- Скрипт для плавного скролла, если нужно -->
    <script>
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                const targetId = this.getAttribute('href');
                if(targetId === '#') return;
                const targetElement = document.querySelector(targetId);
                if(targetElement){
                    e.preventDefault();
                    targetElement.scrollIntoView({ behavior: 'smooth' });
                }
            });
        });
    </script>

</body>
</html>
