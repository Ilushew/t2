<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}}</title>
    
    <!-- Tailwind CSS (стили) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- HTMX (динамика) -->
    <script src="https://unpkg.com/htmx.org@1.9.6"></script>
    
    <!-- Leaflet (карта) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body class="bg-gray-50 text-gray-800 flex flex-col min-h-screen">
    
    <!-- Шапка -->
    <header class="bg-blue-600 text-white p-4 shadow">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold">Udmurtia AI Route</h1>
            <div>
                {{if .IsAuthenticated}}
                    <span class="mr-4">{{.Email}}</span>
                    <a href="/auth/logout"
                       class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded transition">
                        Выйти
                    </a>
                {{else}}
                    <a href="/auth/register"
                       class="bg-white text-blue-600 hover:bg-gray-100 px-4 py-2 rounded transition">
                        Войти
                    </a>
                {{end}}
            </div>
        </div>
    </header>

    <!-- Основной контент (сюда вставится index.html) -->
    <main class="flex-grow container mx-auto p-4">
        {{template "content" .}}
    </main>

    <!-- Подвал -->
    <footer class="bg-gray-800 text-white p-4 text-center">
        <p>Хакатон 2026 | Удмуртия</p>
    </footer>

</body>
</html>
