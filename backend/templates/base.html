<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}}</title>

    <!-- Google Fonts: Montserrat (аналог T2 Halvar Breit) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;800&display=swap" rel="stylesheet">

    <!-- Tailwind CSS (стили) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- T2 Brand Colors -->
    <script>
    tailwind.config = {
        theme: {
            extend: {
                colors: {
                    't2-black': '#000000',
                    't2-white': '#FFFFFF',
                    't2-magenta': '#FF3495',
                    't2-green': '#A7FC00',
                    't2-blue': '#00BFFF',
                },
                fontFamily: {
                    sans: ['Montserrat', 'system-ui', 'sans-serif'],
                }
            }
        }
    }
    </script>

    <!-- HTMX (динамика) -->
    <script src="https://unpkg.com/htmx.org@1.9.6"></script>

    <!-- Leaflet (карта) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body class="bg-t2-white text-t2-black flex flex-col min-h-screen font-sans">

    <!-- Шапка -->
    <header class="bg-t2-black text-t2-white border-b-2 border-t2-magenta p-4 shadow">
        <div class="container mx-auto flex flex-col sm:flex-row justify-between items-center gap-3">
            <h1 class="text-xl font-bold tracking-widest">
                МАРШРУТЫ ПО УДМУРТИИ
            </h1>
            <div>
                {{if .IsAuthenticated}}
                    <a href="/profile" class="mr-0 sm:mr-4 mb-2 sm:mb-0 inline-block hover:text-t2-magenta transition">{{.Email}}</a>
                    <a href="/auth/logout"
                       class="border border-t2-black text-t2-black hover:bg-t2-magenta hover:text-t2-white hover:border-t2-magenta px-4 py-2 rounded-none transition text-center block sm:inline-block text-sm tracking-wider">
                        ВЫЙТИ
                    </a>
                {{else}}
                    <a href="/auth/register"
                       class="bg-t2-black text-t2-white hover:bg-t2-magenta px-4 py-2 rounded-none transition text-center block sm:inline-block text-sm tracking-wider font-bold">
                        ВОЙТИ
                    </a>
                {{end}}
            </div>
        </div>
    </header>

    <!-- Основной контент -->
    <main class="flex-grow container mx-auto p-4">
        {{template "content" .}}
    </main>

    <!-- Подвал -->
    <footer class="bg-t2-white border-t-2 border-t2-magenta p-4 text-center text-sm tracking-wider">
        <p>ХАХАТОН 2026 | УДМУРТИЯ</p>
    </footer>

</body>
</html>
