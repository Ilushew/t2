<div id="verify-form" class="space-y-4">
    <p class="text-sm tracking-wider text-center">КОД ОТПРАВЛЕН НА ВАШ EMAIL</p>
    <form hx-post="/auth/verify" hx-target="#verify-form" hx-swap="outerHTML" class="space-y-4">
        <input type="hidden" name="email" value="{{.email}}">
        <div>
            <label class="block text-sm font-bold tracking-wider">КОД ИЗ EMAIL</label>
            <input type="text" name="code" required maxlength="6"
                   class="w-full px-4 py-2 border-2 border-t2-black bg-t2-white text-t2-black rounded-none text-2xl text-center tracking-widest">
        </div>
        <button type="submit"
                class="w-full bg-t2-black text-t2-white py-2 px-4 rounded-none hover:bg-t2-magenta transition font-bold tracking-wider text-sm">
            ПОДТВЕРДИТЬ
        </button>
    </form>
</div>
