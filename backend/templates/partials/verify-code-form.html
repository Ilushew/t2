<div id="verify-form">
    <style>
        .verify-wrapper {
            display: flex;
            flex-direction: column;
            gap: 16px;
            animation: fadeSlideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeSlideIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .verify-subtitle {
            text-align: center;
            color: #aaaaaa;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.5px;
            margin: 0 0 8px;
        }

        .verify-error {
            text-align: center;
            color: #ff4040;
            font-size: 14px;
            font-weight: 600;
            padding: 12px 16px;
            background: rgba(255, 64, 64, 0.1);
            border: 1px solid rgba(255, 64, 64, 0.3);
            border-radius: 10px;
            margin-bottom: 8px;
        }

        .code-input.error {
            border-color: #ff4040;
            background: rgba(255, 64, 64, 0.05);
        }

        .verify-form-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #aaaaaa;
            margin-bottom: 8px;
        }

        .code-input {
            width: 100%;
            padding: 18px 16px;
            background: #1e1e1e;
            border: 2px solid #333333;
            border-radius: 14px;
            color: #ffffff;
            font-size: 28px;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            text-align: center;
            letter-spacing: 10px;
            transition: all 0.3s ease;
            caret-color: #ff40d0;
        }

        .code-input::placeholder {
            color: #555555;
            letter-spacing: 6px;
            font-size: 22px;
        }

        .code-input:focus {
            border-color: #ff40d0;
            outline: none;
            box-shadow: 0 0 0 4px rgba(255, 64, 208, 0.15);
            background: #252525;
        }

        .btn-verify {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #ff40d0 0%, #d600a0 100%);
            color: #fff;
            border: none;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 4px;
        }

        .btn-verify:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 35px rgba(255, 64, 208, 0.35);
        }

        .btn-verify:active {
            transform: translateY(0);
        }

        form.htmx-request .btn-verify {
            opacity: 0.7;
            pointer-events: none;
            cursor: wait;
        }
    </style>

    <div class="verify-wrapper">
        <p class="verify-subtitle">Код отправлен на ваш email - {{.email}}</p>
        <p class="verify-subtitle">Код действителен 15 минут</p>
        {{if .error}}
        <div class="verify-error">
             {{.error}}
        </div>
        {{end}}

        <form hx-post="/auth/verify"
              hx-target="#verify-form"
              hx-swap="outerHTML"
              class="verify-form-container">
            
            <input type="hidden" name="email" value="{{.email}}">
            
            <div class="form-group">
                <label class="form-label" for="code-field">Код из email</label>
                <input type="text"
                       id="code-field"
                       name="code"
                       required
                       maxlength="6"
                       inputmode="numeric"
                       pattern="[0-9]*"
                       autocomplete="one-time-code"
                       class="code-input{{if .error}} error{{end}}"
                       placeholder="••••••">
            </div>

            <button type="submit" class="btn-verify">
                Подтвердить
            </button>
        </form>
    </div>
</div>
