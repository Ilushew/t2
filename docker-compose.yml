version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: udmurtia_backend
    restart: always
    environment:
      - GIN_MODE=release
    networks:
      - app-network
    volumes:
      - ./backend/templates:/root/templates
      - ./backend/static:/root/static
  nginx:
    image: nginx:alpine
    container_name: udmurtia_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./backend/static:/var/www/static:ro
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge